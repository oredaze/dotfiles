set -g default-terminal "screen-256color"
set -ga terminal-overrides ',*256col*:Tc'
#set -g status-utf8 on
#set -q -g -w utf8 on
#set -g default-shell "/usr/bin/zsh"
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on
set -s escape-time 0
set -g history-limit 10000
set -g visual-bell off
set -g bell-action other
set -g mouse on
set -g set-clipboard on
set -g set-titles on
setw -g aggressive-resize on
setw -g allow-rename on
setw -g clock-mode-style 12
setw -g mode-keys vi
setw -g monitor-activity on
#setw -g monitor-bell on -->broken?
setw -g monitor-silence 0

#### THEME ####
set -g status-position bottom
set -g status-interval 5
set -g status-justify "left"
set -g status-left " "
set -g pane-border-format "#[fg=red, bold]>>>"
set -g pane-border-style fg=black
set -g pane-active-border-style fg=green
set -g status-style fg=green,bg=black
set -g window-status-current-format "#[fg=black, bg=green] #I:#W#F "
set -g status-right "#[fg=green] Session: \"#S\"#[fg=black, bold] :: #[fg=green, none]Host: \"#H\"#[fg=black, bold] :: #[fg=green, none]%a %d %b(%m) %Y#[fg=black, bold] :: #[fg=green, none]%I:%M %p "
set -g window-status-separator "#[fg=black, bold] :: "
set -g window-status-activity-style none
set -g status-left-length 1
set -g status-right-length 110
set -g main-pane-width 134
set -g main-pane-height 44

#### HOTKEYS ####
unbind C-b
unbind M-w
set -g prefix M-w
bind M-w send-prefix

unbind space

unbind P
bind P source-file ~/.tmux.conf

unbind v
bind v split-window -h
unbind s
bind s split-window -v

unbind t
bind t new-window

unbind `
bind ` last-window

unbind r
bind r rotate-window -D
bind R rotate-window -U

unbind right
bind right select-pane -R
unbind left
bind left select-pane -L
unbind down
bind down select-pane -D
unbind up
bind up select-pane -U

unbind l
bind l select-pane -R
unbind h
bind h select-pane -L
unbind j
bind j select-pane -D
unbind k
bind k select-pane -U

unbind tab
bind tab select-pane -l

bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9
bind 0 select-window -t 0

unbind n
bind n command-prompt 'rename-window %%'

unbind z
bind z resize-pane -Z

unbind x
bind x break-pane

unbind F1
bind F1 select-layout main-vertical
unbind F2
bind F2 select-layout main-horizontal
unbind F3
bind F3 select-layout even-horizontal
unbind F4
bind F4 select-layout tiled

unbind c
bind c copy-mode

unbind p
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key p paste-buffer
bind-key -T copy-mode-vi 'Escape' send -X cancel
bind-key -T copy-mode-vi 'Space' send -X clear-selection

unbind q
unbind Q
bind-key q kill-pane
bind-key Q kill-window
unbind M-q
bind-key M-q kill-server
