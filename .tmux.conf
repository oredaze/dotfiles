set -g default-terminal "screen-256color"
#set -g status-utf8 on
#set -q -g -w utf8 on
#set -g default-shell "/usr/bin/zsh"
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on
set -s escape-time 0
set -g history-limit 10000
set -g visual-bell off
set -g bell-action other
set -g mouse off
set -g set-titles on
setw -g aggressive-resize on
setw -g allow-rename on
setw -g clock-mode-style 12
setw -g mode-keys vi
setw -g monitor-activity on
#setw -g monitor-bell on -->broken?
setw -g monitor-silence 0

#### THEME ####
set -g status-interval 5
set -g status-justify "left"
set -g status-left " "
set -g pane-active-border-style fg=red
set -g status-style fg=red,bg=black
set -g window-status-current-format "#[fg=black, bg=red] #I:#W "
set -g status-right "#[fg=red] \"#H\" :: %a, %d-%b(%m)-%Y :: %I:%M %p "
set -g window-status-separator "#[fg=black, bold] | "
set -g window-status-activity-style none
set -g status-left-length 1
set -g status-right-length 110

#### HOTKEYS ####
unbind C-b
set -g prefix F1
bind F1 send-prefix

unbind p
bind p source-file ~/.tmux.conf

unbind v
bind v split-window -h
unbind s
bind s split-window -v

unbind t
bind t new-window
unbind space

unbind `
bind ` last-window

unbind r
bind r rotate-window -D

unbind [
bind [ previous-window
unbind ]
bind ] next-window

unbind right
bind right select-pane -R
unbind left
bind left select-pane -L
unbind down
bind down select-pane -D
unbind up
bind up select-pane -U

unbind l
bind l select-pane -R
unbind h
bind h select-pane -L
unbind j
bind j select-pane -D
unbind k
bind k select-pane -U

bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9
bind 0 select-window -t 0

unbind n
bind n command-prompt 'rename-window %%'

unbind x
bind x break-pane

unbind q
unbind Q
bind-key q kill-window
bind-key Q kill-server

unbind c
bind-key c kill-pane
